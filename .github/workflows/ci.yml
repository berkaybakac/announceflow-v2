name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/announceflow"
      SECRET_KEY: "ci-secret-key-announceflow-0123456789abcdef"
      COQUI_TOS_AGREED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pyright
        run: python -m pyright

      - name: Run tests
        run: python -m pytest -q --cov=backend --cov=agent --cov=shared --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=68

      - name: Enforce global branch coverage (>= 70%)
        run: |
          python scripts/check_branch_coverage.py \
            --coverage-xml coverage.xml \
            --threshold 70

      - name: Determine patch base SHA
        id: patch_base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Enforce patch coverage (>= 80%)
        if: steps.patch_base.outputs.base_sha != ''
        run: |
          python scripts/check_patch_coverage.py \
            --coverage-xml coverage.xml \
            --base-sha "${{ steps.patch_base.outputs.base_sha }}" \
            --threshold 80

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
