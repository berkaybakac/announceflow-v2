name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/announceflow"
      SECRET_KEY: "ci-secret-key-announceflow-0123456789abcdef"
      COQUI_TOS_AGREED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pyright
        run: python -m pyright

      - name: Run tests
        run: python -m pytest -q --cov=backend --cov=agent --cov=shared --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
